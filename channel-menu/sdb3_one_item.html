<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>CWC Channel Menu One Item</title>
</head>
<body>

    <label for="idToken">Set identity token:</label></br>
    <input type="text" id="idToken" name="idToken" size="50"></br>
    <button type="button" id="setIdentityToken" onclick="setIdentityToken()"> Confirm </button></br></br>
    <button type="button" id="clearAuthBtn" onclick="clearAuthSession()"> Clear Authorization Session </button>

    </br></br><hr></br>

    <h3>Core Channel Menu API Controls:</h3>
    <button onclick="embeddedservice_bootstrap.utilAPI.showChatButton()">showChatButton</button>
    <button onclick="embeddedservice_bootstrap.utilAPI.hideChatButton()">hideChatButton</button>
    <button onclick="embeddedservice_bootstrap.utilAPI.launchChat()">launchChat</button>
    <button onclick="embeddedservice_bootstrap.utilAPI.minimizeChat()">minimizeChat</button>

    <script type='text/javascript'>
        function clearAuthSession() {
            console.log("Clearing user session.");
            if (window.embeddedservice_bootstrap) {
                embeddedservice_bootstrap.userVerificationAPI.clearSession();
            }
        }

        function setIdentityToken() {
            var token = document.getElementById("idToken").value;
            console.log("Setting Identity Token: " + token);
            if (window.embeddedservice_bootstrap) {
                embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                    "identityTokenType": "JWT",
                    "identityToken": token
                });
            }
        }

        window.addEventListener('onEmbeddedMessagingChannelMenuVisibilityChanged', function (e) {
            console.log('[VIS]', e.detail);
        });
        window.addEventListener('onEmbeddedMessagingReady', function () {
            console.log('[CWC] onEmbeddedMessagingReady');
        });
        window.addEventListener('onEmbeddedMessagingButtonCreated', function () {
            console.log('[CWC] onEmbeddedMessagingButtonCreated');
        });
    </script>

    <script type='text/javascript' src='https://orgfarm-56a5d701be.test1.my.pc-rnd.salesforce.com/embeddedservice/menu/fab.min.js'></script>
    <script type='text/javascript'>
        var initESW = function (gslbBaseURL) {
            embedded_svc.menu.settings.scrt2BaseUrl = 'https://orgfarm-56a5d701be.test1.my.pc-rnd.salesforce-scrt.com';

            embedded_svc.menu.snippetSettings = embedded_svc.menu.snippetSettings || {};
            embedded_svc.menu.snippetSettings.Live_Chat = {
                settings: {
                    hideChatButtonOnLoad: true
                }
            };

            var __bootstrapValue;
            Object.defineProperty(window, 'embeddedservice_bootstrap', {
                configurable: true,
                enumerable: true,
                get: function () { return __bootstrapValue; },
                set: function (value) {
                    __bootstrapValue = value;
                    if (value && value.settings) {
                        value.settings.hideChatButtonOnLoad = true;
                        console.log('[Workaround] Pre-applied hideChatButtonOnLoad=true on bootstrap assignment');
                    }
                }
            });

            embedded_svc.menu.init(
                'https://orgfarm-56a5d701be.test1.my.pc-rnd.salesforce.com',
                'https://d.la15-test1-uswest2-core4.pc-aws.salesforceliveagent.com/chat',
                gslbBaseURL,
                '00DSG00000qm0Cf',
                'Channel_Menu_One_Item'
            );
        };

        if (!window.embedded_svc || !window.embedded_svc.menu) {
            var s = document.createElement('script');
            s.setAttribute('src', 'https://orgfarm-56a5d701be.test1.my.pc-rnd.salesforce.com/embeddedservice/menu/fab.min.js');
            s.onload = function () { initESW(null); };
            document.body.appendChild(s);
        } else {
            initESW('https://orgfarm-56a5d701be.test1.my.pc-rnd.salesforce.com');
        }
    </script>
</body>
</html>
