    <label for="idToken">Set identity token:</label></br>
    <input type="text" id="idToken" name="idToken" size="50"></br>

    <button type="button" id="clearAuthBtn" onclick="clearAuthSession()"> Clear Authorization Session </button>

    </br></br><hr></br>

    <h3>Core Channel Menu API Controls:</h3>

    <button onclick="embeddedservice_bootstrap.utilAPI.hideChatButton()">hideChatButton</button>
    <button onclick="embeddedservice_bootstrap.utilAPI.launchChat()">launchChat</button>

    <script type='text/javascript'>
        // Your standard session clearing logic
        function clearAuthSession() {
            console.log("Clearing user session.");
            // Keep your standard verification API if your token setup relies on bootstrap
            if (window.embeddedservice_bootstrap) {
                embeddedservice_bootstrap.userVerificationAPI.clearSession();
            }
        }

        function setIdentityToken() {
            var token = document.getElementById("idToken").value;
            console.log("Setting Identity Token: " + token);
            if (window.embeddedservice_bootstrap) {
                embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                    "identityTokenType":"JWT",
                    "identityToken": token
                });
            }
        }

        // Correct API Wrappers targeting Channel Menu core
        function callShowMenu() {
            console.log("Executing Channel Menu Show...");
            // Standard V1/ECV2 Channel Menu show API fallback
            if (window.embedded_svc && window.embedded_svc.menu) {
                // If it exposes standard toggle/show methods
                console.log("Menu object found.");
            }
        }

        function callHideMenu() {
            console.log("Executing Channel Menu Hide...");
            // Direct DOM manipulation or API call if exposed by fab.js
        }
    </script>

	<script type='text/javascript'>
	    function clearAuthSession() {
	        if (window.embeddedservice_bootstrap) {
	            embeddedservice_bootstrap.userVerificationAPI.clearSession();
	        }
	    }
	    function setIdentityToken() {
	        var token = document.getElementById("idToken").value;
	        if (window.embeddedservice_bootstrap) {
	            embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
	                identityTokenType: "JWT",
	                identityToken: token
	            });
	        }
	    }
	
	    window.addEventListener('onEmbeddedMessagingChannelMenuVisibilityChanged', function (e) {
	        console.warn('%c[VIS] isVisible=' + e.detail.isVisible + ' devName=' + e.detail.devName,
	            'background:#a40;color:#fff;padding:2px 6px;border-radius:3px');
	        console.trace('[VIS] who emitted this?');
	    });
	    window.addEventListener('onEmbeddedMessagingReady', function () {
	        console.warn('%c[CWC] onEmbeddedMessagingReady',
	            'background:#06c;color:#fff;padding:2px 6px;border-radius:3px');
	    });
	    window.addEventListener('onEmbeddedMessagingButtonCreated', function () {
	        console.warn('%c[CWC] onEmbeddedMessagingButtonCreated',
	            'background:#06c;color:#fff;padding:2px 6px;border-radius:3px');
	    });
	
	    (function () {
	        var orig = window.addEventListener;
	        window.addEventListener = function (type, listener, ...rest) {
	            if (type === 'message') {
	                var wrapped = function (e) {
	                    if (e && e.data && typeof e.data === 'object'
	                        && /conversation|fabready|launchChat|setIdentity|FAB|conversationStatus/i.test(
	                            JSON.stringify(e.data).slice(0, 200))) {
	                        console.log('%c[postMessage]', 'background:#080;color:#fff;padding:2px 6px',
	                            e.data?.method || '?', e.data);
	                    }
	                    return listener.apply(this, arguments);
	                };
	                return orig.call(this, type, wrapped, ...rest);
	            }
	            return orig.apply(this, arguments);
	        };
	    })();
	</script>
