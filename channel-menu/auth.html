<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>CWC Channel Menu One Item</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; }
        .panel { border: 1px solid #ddd; padding: 12px; border-radius: 6px; margin-bottom: 12px; max-width: 720px; }
        .panel h3 { margin: 0 0 8px 0; font-size: 14px; }
        .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
        label { font-size: 12px; color: #555; }
        input { font-family: monospace; padding: 4px 6px; }
        input[type="text"] { min-width: 280px; }
        button { padding: 4px 10px; }
        .small { font-size: 11px; color: #888; }
        code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>CWC Channel Menu One Item</h1>
    <h2>orgfarm-2c8844132a / ECV2</h2>

    <div class="panel">
        <h3>Identity token</h3>
        <div class="row">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" value="testSubject12345" size="30">
            <button type="button" onclick="getJwtAndSet()">Get JWT &amp; Set</button>
        </div>
        <div class="row">
            <label for="idToken">Token:</label>
            <input type="text" id="idToken" size="60" placeholder="auto-populated by Get JWT, or paste manually">
            <button type="button" onclick="setIdentityTokenFromInput()">Set from input</button>
        </div>
        <div class="row">
            <button type="button" onclick="clearAuthSession()">Clear session</button>
        </div>
        <p class="small">JWT fetched from portico (kid <code id="kidDisplay"></code>, expires in 7 days). Change <code>KEY_ID</code> in source if your deployment uses a different key.</p>
    </div>

    <div class="panel">
        <h3>Host APIs</h3>
        <div class="row">
            <button onclick="embeddedservice_bootstrap.utilAPI.showChatButton()">showChatButton</button>
            <button onclick="embeddedservice_bootstrap.utilAPI.hideChatButton()">hideChatButton</button>
            <button onclick="embeddedservice_bootstrap.utilAPI.launchChat()">launchChat</button>
            <button onclick="embeddedservice_bootstrap.utilAPI.minimizeChat()">minimizeChat</button>
        </div>
    </div>

    <script type='text/javascript'>
        var PORTICO_BASE = 'https://portico.sfproxy.controltelemetry.aws-dev2-uswest2.aws.sfdc.cl/api/v1/miaw/getJwtToken';
        var KEY_ID = '5f103f1b-ee38-404c-ac94-83c427764813';
        var EXP_SECONDS = 7 * 24 * 60 * 60;

        document.getElementById('kidDisplay').textContent = KEY_ID;

        function buildPorticoUrl(subject) {
            var params = new URLSearchParams({
                issuer: 'testIssuer',
                subject: subject || 'testSubject12345',
                jwtExpInSeconds: String(EXP_SECONDS),
                keyId: KEY_ID
            });
            return PORTICO_BASE + '?' + params.toString();
        }

        function getJwtAndSet() {
            var subject = document.getElementById('subject').value || 'testSubject12345';
            var url = buildPorticoUrl(subject);
            console.log('Fetching JWT for subject=' + subject + ' from portico');
            fetch(url)
                .then(function (r) {
                    if (!r.ok) throw new Error('portico returned HTTP ' + r.status);
                    return r.text();
                })
                .then(function (body) {
                    var token = body.trim();
                    try {
                        var parsed = JSON.parse(body);
                        if (parsed && typeof parsed === 'object') {
                            token = parsed.accessToken || parsed.token || parsed.jwt || parsed.identityToken || token;
                        }
                    } catch (_) { }
                    document.getElementById('idToken').value = token;
                    console.log('JWT received; calling setIdentityToken');
                    if (!window.embeddedservice_bootstrap) {
                        console.warn('embeddedservice_bootstrap not ready; token stored in input only');
                        return;
                    }
                    embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                        identityTokenType: 'JWT',
                        identityToken: token
                    });
                })
                .catch(function (err) {
                    console.error('JWT fetch failed:', err);
                });
        }

        function setIdentityTokenFromInput() {
            var token = document.getElementById('idToken').value.trim();
            if (!token) {
                console.warn('Token input is empty');
                return;
            }
            if (!window.embeddedservice_bootstrap) {
                console.warn('embeddedservice_bootstrap not ready');
                return;
            }
            embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                identityTokenType: 'JWT',
                identityToken: token
            });
        }

        function clearAuthSession() {
            console.log('Clearing user session');
            if (window.embeddedservice_bootstrap) {
                embeddedservice_bootstrap.userVerificationAPI.clearSession(true);
            }
        }

        window.addEventListener('onEmbeddedMessagingChannelMenuVisibilityChanged', function (e) {
            console.log('onEmbeddedMessagingChannelMenuVisibilityChanged:', e.detail);
        });
        window.addEventListener('onEmbeddedMessagingReady', function () {
            console.log('onEmbeddedMessagingReady emitted');
        });
        window.addEventListener('onEmbeddedMessagingButtonCreated', function () {
            console.log('onEmbeddedMessagingButtonCreated emitted');
        });
        window.addEventListener('onEmbeddedMessagingIdentityTokenExpired', function () {
            console.log('onEmbeddedMessagingIdentityTokenExpired emitted');
        });
        window.addEventListener('onEmbeddedMessagingWindowMinimized', function () {
            console.log('onEmbeddedMessagingWindowMinimized emitted');
        });
        window.addEventListener('onEmbeddedMessagingWindowMaximized', function () {
            console.log('onEmbeddedMessagingWindowMaximized emitted');
        });
        window.addEventListener('onEmbeddedMessagingConversationOpened', function (e) {
            console.log('onEmbeddedMessagingConversationOpened:', e.detail);
        });
        window.addEventListener('onEmbeddedMessagingConversationClosed', function (e) {
            console.log('onEmbeddedMessagingConversationClosed:', e.detail);
        });
    </script>

    <script type='text/javascript' src='https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce.com/embeddedservice/menu/fab.min.js'></script>
    <script type='text/javascript'>
        var initESW = function (gslbBaseURL) {
            embedded_svc.menu.snippetSettings = embedded_svc.menu.snippetSettings || {};
            embedded_svc.menu.settings.devMode = true;
            embedded_svc.menu.settings.scrt2BaseUrl = 'https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce-scrt.com';

            embedded_svc.menu.init(
                'https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce.com',
                'https://d.la11-test1-uswest2-core4.pc-aws.salesforceliveagent.com/chat',
                gslbBaseURL,
                '00DLT00000EtZpt',
                'ECV2'
            );
        };

        if (!window.embedded_svc || !window.embedded_svc.menu) {
            var s = document.createElement('script');
            s.setAttribute('src', 'https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce.com/embeddedservice/menu/fab.min.js');
            s.onload = function () { initESW(null); };
            document.body.appendChild(s);
        } else {
            initESW('https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce.com');
        }
    </script>
</body>
</html>
