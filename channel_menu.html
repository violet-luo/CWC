<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
</head>
<body>

    <label for="idToken">Set identity token:</label></br>
    <input type="text" id="idToken" name="idToken" size="50"></br>
    <button type="button" id="setIdentityToken" onclick="setIdentityToken()"> Confirm </button></br></br>
    <button type="button" id="clearAuthBtn" onclick="clearAuthSession()"> Clear Authorization Session </button>

    </br></br><hr></br>

    <h3>Channel Layout & Interaction Testing:</h3>
    <button type="button" onclick="callLaunchChat()"> 1. Call launchChat() (Verify Layering) </button>
    <button type="button" onclick="callHideButton()"> 2. Call hideChatButton() </button>
    <button type="button" onclick="callShowButton()"> 3. Call showChatButton() </button>

    <script type='text/javascript'>
        function clearAuthSession() { embeddedservice_bootstrap.userVerificationAPI.clearSession(); }
        function setIdentityToken() {
            var token = document.getElementById("idToken").value;
            embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                "identityTokenType":"JWT", "identityToken": token
            });
        }

        // Test APIs
        function callLaunchChat() {
            console.log("Executing: utilAPI.launchChat()");
            embeddedservice_bootstrap.utilAPI.launchChat();
        }
        function callHideButton() {
            console.log("Executing: utilAPI.hideChatButton()");
            embeddedservice_bootstrap.utilAPI.hideChatButton();
        }
        function callShowButton() {
            console.log("Executing: utilAPI.showChatButton()");
            embeddedservice_bootstrap.utilAPI.showChatButton();
        }

        // Event Listeners for Channel State Verification
        window.addEventListener("onEmbeddedMessagingReady", () => {
            console.log("[QA Log] onEmbeddedMessagingReady emitted");
        });
        window.addEventListener("onEmbeddedMessagingChannelMenuVisibilityChanged", (e) => {
            console.log("[QA Log] Visibility Changed! isVisible =", e.detail.isVisible);
        });
    </script>

    <script type='text/javascript'>
		function initEmbeddedMessaging() {
			try {
				embeddedservice_bootstrap.settings.language = 'en_US';
				embeddedservice_bootstrap.init(
					'00DLT00000EtZpt',
					'ECV2',
					'https://orgfarm-2c8844132a.test1.my.pc-rnd.site.com/ESWECV21780077900976',
					{ scrt2URL: 'https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce-scrt.com' }
				);
			} catch (err) {
				console.error('Error loading Embedded Messaging: ', err);
			}
		};
    </script>
    <script type='text/javascript' src='https://orgfarm-2c8844132a.test1.my.pc-rnd.site.com/ESWECV21780077900976/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
</body>
</html>
