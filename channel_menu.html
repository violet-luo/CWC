<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>CWC Channel Menu (ECV2) Test Dashboard</title>
</head>
<body>

    <label for="idToken">Set identity token:</label></br>
    <input type="text" id="idToken" name="idToken" size="50"></br>
    <button type="button" id="setIdentityToken" onclick="setIdentityToken()"> Confirm </button></br></br>
    <button type="button" id="clearAuthBtn" onclick="clearAuthSession()"> Clear Authorization Session </button>

    </br></br><hr></br>

    <h3>Core Channel Menu API Controls:</h3>
    <button type="button" onclick="embeddedservice_bootstrap.utilAPI.showChatButton()"> 1. Call showChatButton() </button>
    <button type="button" onclick="embeddedservice_bootstrap.utilAPI.hideChatButton()"> 2. Call hideChatButton() </button>
    <button type="button" onclick="embeddedservice_bootstrap.utilAPI.launchChat()"> 3. Call launchChat() </button>

    <script type='text/javascript'>
        function clearAuthSession() {
            console.log("Clearing user session.");
            embeddedservice_bootstrap.userVerificationAPI.clearSession();
        }

        function setIdentityToken() {
            var token = document.getElementById("idToken").value;
            console.log("Setting Identity Token: " + token);
            embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                "identityTokenType":"JWT",
                "identityToken": token
            });
        }

        // Add event listeners to watch the background state machine changes
        window.addEventListener("onEmbeddedMessagingReady", () => {
            console.log("[QA Log] Received the onEmbeddedMessagingReady event…");
        });

        window.addEventListener("onEmbeddedMessagingChannelMenuVisibilityChanged", (e) => {
            console.log("[QA Log] Channel Menu Visibility Changed! Current state:", e.detail.isVisible);
        });
    </script>

    <script type='text/javascript'>
        function initChannelMenu() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                
                // This is where you paste the exact parameters from your Channel Menu Snippet
                embeddedservice_bootstrap.init(
                    '00DLT00000EtZpt', // Organization ID
                    'ECV2',            // Channel Menu Deployment Name (Must match your setup)
                    'https://orgfarm-2c8844132a.test1.my.pc-rnd.site.com/ESWECV21780077900976', // Site URL
                    {
                        scrt2URL: 'https://orgfarm-2c8844132a.test1.my.pc-rnd.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Error loading Channel Menu: ', err);
            }
        };
    </script>
    
    <script type='text/javascript' src='https://orgfarm-2c8844132a.test1.my.pc-rnd.site.com/ESWECV21780077900976/assets/js/bootstrap.min.js' onload='initChannelMenu()'></script>
</body>
</html>
